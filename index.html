<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BurpOllama</title>
  <style>
    :root{
      --bg:#0f1419;
      --panel:#151b22;
      --panel-2:#1b232c;
      --panel-3:#202a34;
      --line:#2b3744;
      --text:#e8edf2;
      --muted:#94a3b3;
      --soft:#c6d1dc;
      --green:#4ade80;
      --blue:#60a5fa;
      --amber:#f5c451;
      --red:#fb7185;
      --cyan:#22d3ee;
      --violet:#a78bfa;
      --shadow:0 18px 45px rgba(0,0,0,.28);
      --radius:8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:inherit;text-decoration:none}
    .app{display:grid;grid-template-columns:260px 1fr;height:100vh;min-width:960px}
    .sidebar{background:#111820;border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
    .brand{height:64px;display:flex;align-items:center;gap:12px;padding:0 18px;border-bottom:1px solid var(--line)}
    .mark{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--green),var(--blue));display:grid;place-items:center;color:#071016;font-weight:900}
    .brand-title{font-weight:800;letter-spacing:.2px}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:2px}
    .nav{padding:14px 10px;display:flex;flex-direction:column;gap:4px;overflow:auto}
    .nav a{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:7px;color:var(--soft);font-size:14px}
    .nav a:hover{background:var(--panel-2);color:var(--text)}
    .nav a.active{background:#213044;color:#fff;border:1px solid #31465f}
    .nav .ico{width:20px;text-align:center;color:var(--muted)}
    .sidebar-foot{margin-top:auto;padding:14px;border-top:1px solid var(--line);font-size:12px;color:var(--muted)}
    .main{min-width:0;display:flex;flex-direction:column;height:100vh}
    .topbar{height:64px;border-bottom:1px solid var(--line);background:rgba(18,24,31,.96);display:flex;align-items:center;justify-content:space-between;padding:0 22px}
    .page-title{font-size:18px;font-weight:750}
    .top-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pill{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);background:var(--panel);border-radius:999px;padding:6px 10px;font-size:12px;color:var(--soft);white-space:nowrap}
    .dot{width:8px;height:8px;border-radius:50%;background:var(--muted)}
    .dot.ok{background:var(--green)} .dot.warn{background:var(--amber)} .dot.bad{background:var(--red)}
    .content{flex:1;overflow:auto;padding:22px;background:linear-gradient(180deg,#10161d,#0f1419 280px)}
    .grid{display:grid;gap:14px}
    .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .card.pad{padding:16px}
    .card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .card-title{font-size:14px;font-weight:750;color:#f4f7fa}
    .card-sub{font-size:12px;color:var(--muted)}
    .metric{font-size:30px;font-weight:800;line-height:1.1}
    .metric-label{font-size:12px;color:var(--muted);margin-top:5px}
    .toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
    .input,.select,.textarea{background:#10161d;color:var(--text);border:1px solid var(--line);border-radius:7px;padding:10px 11px;outline:none}
    .input:focus,.select:focus,.textarea:focus{border-color:var(--blue)}
    .input{min-width:260px}
    .textarea{width:100%;min-height:110px;resize:vertical}
    .btn{border:1px solid var(--line);background:var(--panel-2);color:var(--text);border-radius:7px;padding:10px 12px;font-weight:700;font-size:13px}
    .btn:hover{background:var(--panel-3)}
    .btn.primary{background:#1d4f39;border-color:#2f8a5c;color:#effff6}
    .btn.blue{background:#1d3f63;border-color:#315f91;color:#f1f8ff}
    .btn.danger{background:#57202a;border-color:#8b3442;color:#fff1f3}
    .progress{height:8px;background:#0d1218;border:1px solid var(--line);border-radius:999px;overflow:hidden}
    .bar{height:100%;width:0;background:linear-gradient(90deg,var(--blue),var(--green))}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 12px;border-bottom:1px solid var(--line);font-size:13px;text-align:left;vertical-align:top}
    th{color:var(--muted);font-size:12px;font-weight:700;background:#121922;position:sticky;top:0;z-index:1}
    tr:hover td{background:rgba(255,255,255,.02)}
    .table-wrap{border:1px solid var(--line);border-radius:var(--radius);overflow:auto;background:var(--panel);max-height:650px}
    .sev{font-weight:800}
    .sev.CRITICAL{color:var(--red)} .sev.HIGH{color:#fb923c} .sev.MEDIUM{color:var(--amber)}
    .sev.LOW{color:var(--blue)} .sev.INFO{color:var(--muted)}
    .status{font-weight:800;text-transform:uppercase;font-size:11px}
    .status.running{color:var(--blue)} .status.complete{color:var(--green)} .status.error{color:var(--red)} .status.queued{color:var(--amber)}
    .list{display:flex;flex-direction:column;gap:9px}
    .row-card{padding:12px;border:1px solid var(--line);border-radius:7px;background:var(--panel-2);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .row-card:hover{border-color:#3e5268}
    .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
    .muted{color:var(--muted)}
    .small{font-size:12px}
    .split{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(360px,.8fr);gap:14px}
    .pre{white-space:pre-wrap;word-break:break-word;background:#0d1218;border:1px solid var(--line);border-radius:7px;padding:12px;max-height:520px;overflow:auto;font-size:12px}
    .empty{padding:28px;text-align:center;color:var(--muted);border:1px dashed var(--line);border-radius:var(--radius);background:rgba(255,255,255,.015)}
    .route{display:none}
    .route.active{display:block}
    .tag{display:inline-flex;border:1px solid var(--line);background:#111923;border-radius:999px;padding:4px 8px;font-size:11px;color:var(--soft)}
    .kv{display:grid;grid-template-columns:170px minmax(0,1fr);gap:8px;font-size:13px}
    .kv div:nth-child(odd){color:var(--muted)}
    .notice{border-left:3px solid var(--blue);background:#121b25;padding:12px;border-radius:6px;color:var(--soft)}
    .workflow{display:flex;gap:8px;align-items:center;padding:10px 22px;border-bottom:1px solid var(--line);background:#101720}
    .workflow-step{flex:1;min-width:0;border:1px solid var(--line);background:#121a23;border-radius:999px;padding:7px 10px;text-align:center;font-size:12px;color:var(--muted);font-weight:800}
    .workflow-step.active{background:#17314a;border-color:var(--blue);color:#fff}
    .workflow-step.done{background:#173522;border-color:#2f8a5c;color:#dfffea}
    .simple-section{display:grid;gap:14px}
    .step-card{border-left:3px solid var(--blue)}
    .hidden{display:none!important}
    .state-strip{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:8px}
    .state-chip{border:1px solid var(--line);background:#10161d;border-radius:7px;padding:9px 8px;text-align:center;font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase}
    .state-chip.active{border-color:var(--blue);background:#17314a;color:#fff}
    .state-chip.done{border-color:#2f8a5c;background:#173522;color:#dfffea}
    .timeline{position:relative;display:flex;flex-direction:column;gap:10px}
    .timeline-item{display:grid;grid-template-columns:110px 1fr;gap:12px;align-items:center}
    .timeline-dot{width:10px;height:10px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:8px}
    .timeline-dot.running,.timeline-dot.validating,.timeline-dot.reporting{background:var(--blue)}
    .timeline-dot.completed{background:var(--green)}
    .timeline-dot.failed,.timeline-dot.stopped{background:var(--red)}
    .logbox{height:310px;overflow:auto;background:#0d1218;border:1px solid var(--line);border-radius:7px;padding:12px;font-size:12px}
    .logline{display:grid;grid-template-columns:70px 70px 1fr;gap:8px;border-bottom:1px solid rgba(255,255,255,.04);padding:6px 0}
    .wizard-shell{max-width:920px;margin:0 auto}
    .wizard-hero{padding:30px;background:linear-gradient(135deg,#15243a,#13251e);border-color:#35516d}
    .wizard-hero h1{font-size:28px;line-height:1.25;margin:0 0 10px}
    .wizard-hero p{font-size:15px;line-height:1.65;color:var(--soft);margin:0}
    .wizard-steps{display:grid;grid-template-columns:repeat(9,minmax(0,1fr));gap:6px;margin-bottom:16px}
    .wizard-step{height:7px;border-radius:999px;background:#25313d}
    .wizard-step.active{background:var(--blue)}
    .wizard-step.done{background:var(--green)}
    .wizard-card{padding:24px}
    .wizard-question{font-size:22px;font-weight:800;margin:0 0 8px}
    .wizard-help{color:var(--muted);line-height:1.55;margin-bottom:20px}
    .choice-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
    .choice-card{display:block;text-align:left;border:1px solid var(--line);background:var(--panel-2);color:var(--text);border-radius:10px;padding:16px;min-height:118px}
    .choice-card:hover{border-color:#4b6680;background:var(--panel-3)}
    .choice-card.selected{border-color:var(--green);box-shadow:0 0 0 1px var(--green) inset;background:#173522}
    .choice-title{display:block;font-weight:800;margin-bottom:7px}
    .choice-copy{display:block;color:var(--muted);font-size:12px;line-height:1.45}
    .wizard-actions{display:flex;justify-content:space-between;gap:12px;margin-top:22px}
    .wizard-field{display:grid;gap:8px;margin-bottom:14px}
    .wizard-field label{font-size:13px;font-weight:750;color:var(--soft)}
    .wizard-field .input,.wizard-field .textarea,.wizard-field .select{width:100%}
    .authorization-box{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);background:#111a23;border-radius:9px;padding:16px;line-height:1.5}
    .authorization-box input{margin-top:4px;transform:scale(1.2)}
    .review-list{display:grid;gap:10px}
    .review-item{display:grid;grid-template-columns:160px 1fr;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
    .review-item:last-child{border-bottom:0}
    .review-item span:first-child{color:var(--muted)}
    .beginner-tip{border-left-color:var(--green);background:#13231a}
    @media(max-width:1100px){
      body{overflow:auto}
      .app{grid-template-columns:1fr;min-width:0;height:auto}
      .sidebar{position:relative}
      .nav{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}
      .main{height:auto;min-height:100vh}
      .grid.cols-4,.grid.cols-3,.grid.cols-2,.split{grid-template-columns:1fr}
      .workflow{padding:10px;overflow:auto}.workflow-step{min-width:110px}
      .state-strip{grid-template-columns:repeat(2,minmax(0,1fr))}
      .input{min-width:0;width:100%}
      .topbar{height:auto;min-height:64px;align-items:flex-start;padding:14px;gap:12px;flex-direction:column}
      .wizard-steps{grid-template-columns:repeat(9,26px)}
      .choice-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark">B</div>
        <div>
          <div class="brand-title">BurpOllama</div>
          <div class="brand-sub">Local security platform</div>
        </div>
      </div>
      <nav class="nav" id="nav">
        <a href="/ui/start" data-route="start"><span class="ico">▶</span>Start</a>
        <a href="/ui/active-scan" data-route="active-scan"><span class="ico">●</span>Active Scan</a>
        <a href="/ui/results" data-route="results"><span class="ico">✓</span>Results</a>
        <a href="/ui/history" data-route="history"><span class="ico">↺</span>History</a>
        <a href="/ui/settings" data-route="settings"><span class="ico">S</span>Settings</a>
        <a href="/ui/advanced-console" data-route="advanced-console"><span class="ico">›_</span>Advanced Console</a>
      </nav>
      <div class="sidebar-foot">
        <div class="mono">127.0.0.1:8888</div>
        <div id="ws-state">WebSocket connecting</div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <div class="page-title" id="page-title">Dashboard</div>
          <div class="card-sub" id="page-subtitle">Local scanner control center</div>
        </div>
        <div class="top-meta">
          <span class="pill"><span class="dot" id="health-dot"></span><span id="health-label">Health unknown</span></span>
          <span class="pill">Queue <span class="mono" id="queue-size">0</span></span>
          <span class="pill">Findings <span class="mono" id="top-findings">0</span></span>
          <button class="btn" onclick="refreshAll()">Refresh</button>
        </div>
      </header>
      <div class="workflow" id="workflow-bar"></div>

      <section class="content">
        <section id="route-start" class="route"></section>
        <section id="route-active-scan" class="route"></section>
        <section id="route-results" class="route"></section>
        <section id="route-history" class="route"></section>
        <section id="route-advanced-console" class="route"></section>
        <section id="route-dashboard" class="route"></section>
        <section id="route-scans" class="route"></section>
        <section id="route-scan-detail" class="route"></section>
        <section id="route-findings" class="route"></section>
        <section id="route-review" class="route"></section>
        <section id="route-coverage" class="route"></section>
        <section id="route-attack-graph" class="route"></section>
        <section id="route-autopilot" class="route"></section>
        <section id="route-bounty" class="route"></section>
        <section id="route-reports" class="route"></section>
        <section id="route-settings" class="route"></section>
        <section id="route-ai" class="route"></section>
        <section id="route-scope" class="route"></section>
        <section id="route-storage" class="route"></section>
        <section id="route-system-check" class="route"></section>
        <section id="route-help" class="route"></section>
        <section id="route-placeholder" class="route"></section>
      </section>
    </main>
  </div>

  <script>
    const API = location.origin;
    const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;

    const state = {
      health: {},
      scans: [],
      findings: [],
      review: {pending: [], all: [], count: 0},
      ai: {},
      stats: {},
      selectedScanId: localStorage.getItem('burpollama.selectedScanId') || '',
      coverage: {},
      coverageV2: {},
      advancedCoverage: {},
      graph: {},
      autopilot: {},
      bounty: {},
      scope: {},
      aiPrivacy: {},
      aiAudit: [],
      config: {settings:{}, configured:{}},
      ollamaModels: {installed:[], missing:[], required:[]},
      providerTest: null,
      targetProfile: {},
      adaptivePlan: {},
      systemCheck: {},
      storage: {},
      dryRunResult: null,
      throttleStatus: {},
      findingBuckets: {},
      findingTab: 'valid_bugs',
      advancedMode: localStorage.getItem('burpollama.advancedMode') === 'true',
      route: 'start',
      routeParam: '',
      wizard: {
        step: 1,
        target: '',
        authorized: false,
        scopeType: 'exact',
        customScope: '',
        scanMode: 'conservative',
        aiMode: 'auto_local',
        sessionACookie: '',
        sessionAToken: '',
        sessionBCookie: '',
        sessionBToken: '',
        busy: false,
        error: ''
      }
    };

    const titles = {
      start: ['Guided Start', 'A simple step-by-step setup for your authorized scan.'],
      'active-scan': ['Active Scan', 'Watch progress and control the current scan.'],
      results: ['Results', 'Review findings and download your report.'],
      history: ['Scan History', 'Open previous scans, findings, and reports.'],
      'advanced-console': ['Advanced Console', 'The original expert dashboard and technical tools.'],
      dashboard: ['Home', 'Start here: check status, start a scan, and open reports.'],
      scans: ['Scans', 'Active and historical scan sessions'],
      'scan-detail': ['Scan Detail', 'Pipeline state, report links, coverage, and graph'],
      findings: ['Findings', 'Review what was found and what is ready to submit.'],
      review: ['Review Queue', 'Ambiguous AI triage requiring analyst action'],
      coverage: ['Coverage', 'Tested and untested attack surface'],
      'attack-graph': ['Attack Graph', 'Exploit chains and path prioritization'],
      autopilot: ['Autopilot', 'Start and monitor an automated authorized scan.'],
      bounty: ['Bounty Mode', 'High-impact findings, proof gaps, and bounty reports'],
      reports: ['Reports', 'Export clean bounty reports.'],
      settings: ['Settings', 'Configure sessions and open advanced tools.'],
      ai: ['AI Providers', 'Provider availability, failures, and estimated cost'],
      scope: ['Scope', 'Enforced authorization and safety policy'],
      'system-check': ['System Check', 'Verify that the local platform is working.'],
      storage: ['Storage', 'Durable local state and event store details'],
      help: ['Help', 'Local workflow and endpoint reference']
    };
    const knownRoutes = new Set(['start','active-scan','results','history','advanced-console','dashboard','scans','scan-detail','findings','review','coverage','attack-graph','autopilot','bounty','reports','settings','ai','scope','storage','system-check','help']);

    function esc(v){
      return String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }
    function sevClass(s){ return esc(String(s || 'INFO').toUpperCase()); }
    function endpoint(path){ return API + path; }
    async function json(path, fallback){
      try{
        const r = await fetch(endpoint(path));
        if(!r.ok) return fallback;
        return await r.json();
      }catch(e){ return fallback; }
    }
    async function text(path){
      const r = await fetch(endpoint(path));
      if(!r.ok) throw new Error(await r.text());
      return await r.text();
    }
    function selectedScan(){
      return state.scans.find(s => s.id === state.selectedScanId) || state.scans[0] || null;
    }
    function progressOf(scan){
      const p = scan && scan.progress ? scan.progress : {};
      const total = Number(p.total || 0);
      const current = Number(p.current || 0);
      const ratio = total > 0 ? Math.max(0, Math.min(1, current / total)) : 0;
      const phase = String(scan?.phase || 'queued').toLowerCase();
      const status = String(scan?.status || '').toLowerCase();
      if(['complete','completed'].includes(status) || phase === 'complete') return 100;
      if(phase.includes('recon') || phase.includes('profile') || phase.includes('waf')) return Math.round(0 + ratio * 20);
      if(phase.includes('hunt') || phase.includes('schema') || phase.includes('oob')) return Math.round(20 + ratio * 50);
      if(phase.includes('triage')) return Math.round(70 + ratio * 15);
      if(phase.includes('analysis')) return Math.round(85 + ratio * 7);
      if(phase.includes('report') || phase.includes('intelligence')) return Math.round(92 + ratio * 8);
      return status === 'running' ? 2 : 0;
    }
    function countsBySeverity(){
      const out = {CRITICAL:0,HIGH:0,MEDIUM:0,LOW:0,INFO:0};
      state.findings.forEach(f => { const s = String(f.severity || 'INFO').toUpperCase(); out[s] = (out[s] || 0) + 1; });
      return out;
    }
    function readyFindings(){
      const bountyReady = state.bounty.ready_findings || state.autopilot.ready_to_submit || [];
      if(bountyReady.length) return bountyReady.filter(f => Number(f.quality_score || 0) >= 85 && String(f.grade || f.quality_grade || '').toUpperCase() === 'A');
      return state.findings.filter(f => Number(f.quality_score || 0) >= 85 && String(f.grade || f.quality_grade || '').toUpperCase() === 'A');
    }
    function findingBucket(f){
      const qualityScore = Number(f.quality_score || 0);
      const qualityGrade = String(f.grade || f.quality_grade || '').toUpperCase();
      if(qualityScore >= 85 && qualityGrade === 'A') return 'ready';
      if(qualityScore >= 70) return 'valid';
      const label = String(f.quality_label || '').toUpperCase();
      if(label === 'NEEDS PROOF') return 'needs-proof';
      if(label === 'INFO') return 'info';
      const status = String(f.exploitability_status || f.verdict || '').toLowerCase();
      if(status.includes('false') || status.includes('ignored')) return 'info';
      if(readyFindings().some(r => r.id === f.id)) return 'ready';
      if((f.missing_proof || []).length || f.evidence_strength !== 'strong' || status.includes('manual')) return 'needs-proof';
      return 'candidate';
    }
    function bucketBadge(bucket){
      const labels = {'ready':'READY','valid':'VALID','needs-proof':'NEEDS PROOF','candidate':'CANDIDATE','info':'INFO'};
      return `<span class="tag">${labels[bucket] || 'CANDIDATE'}</span>`;
    }
    function workflowStage(){
      const r = state.route;
      const s = selectedScan();
      if(r === 'reports' || (r === 'results' && s && ['complete','completed'].includes(String(s.status)))) return 'Report';
      if(r === 'findings' || r === 'review' || r === 'results') return 'Review';
      if(s && ['running','queued','paused'].includes(String(s.status))) return 'Scan';
      if(s && ['complete','completed'].includes(String(s.status))) return 'Validate';
      if(r === 'autopilot' || r === 'start') return 'Setup';
      return 'Setup';
    }
    function renderWorkflow(){
      const steps = ['Setup','Scan','Validate','Review','Report'];
      const active = workflowStage();
      const activeIdx = steps.indexOf(active);
      document.getElementById('workflow-bar').innerHTML = steps.map((s,i) => `<div class="workflow-step ${s===active?'active':(i<activeIdx?'done':'')}">${s}</div>`).join('');
    }
    function toggleAdvancedMode(on){
      state.advancedMode = !!on;
      localStorage.setItem('burpollama.advancedMode', state.advancedMode ? 'true' : 'false');
      render();
    }

    let wsFailures = 0;
    function connectWs(){
      const label = document.getElementById('ws-state');
      let ws;
      try{ ws = new WebSocket(WS_URL); }catch(e){ label.textContent = 'Live updates: polling'; return; }
      ws.onopen = () => { wsFailures = 0; label.textContent = 'Live updates connected'; };
      ws.onclose = () => {
        wsFailures += 1;
        if(wsFailures <= 3){
          label.textContent = 'Reconnecting live updates';
          setTimeout(connectWs, 2500 * wsFailures);
        }else{
          label.textContent = 'Live updates: polling';
        }
      };
      ws.onerror = () => { label.textContent = 'Live updates: polling'; };
      ws.onmessage = ev => {
        const m = JSON.parse(ev.data || '{}');
        if(m.type === 'init'){
          state.findings = m.findings || state.findings;
          if(m.scans) state.scans = mergeScans(m.scans);
        }
        if(m.type === 'finding' && m.data) state.findings.unshift(m.data);
        if(m.type === 'stats' && m.data) state.stats = m.data;
        if(m.type === 'progress') patchScan(m.scan_id, {status:'running', phase:m.phase, progress:{current:m.current,total:m.total,label:m.label}});
        if(m.type === 'phase_change') patchScan(m.scan_id, {status:'running', phase:m.phase});
        if(m.type === 'scan_complete') patchScan(m.scan_id, {status:'complete', phase:'complete'});
        if(m.type === 'scan_error') patchScan(m.scan_id, {status:'error', error:m.error});
        if(m.type === 'scan_paused') patchScan(m.scan_id, {status:'paused'});
        if(m.type === 'scan_resumed') patchScan(m.scan_id, {status:'running'});
        if(m.type === 'scan_stopped') patchScan(m.scan_id, {status:'stopped', phase:'stopped'});
        if(m.type === 'attack_graph' && m.scan_id === state.selectedScanId) state.graph = m.data || {};
        if(m.type === 'coverage' && m.scan_id === state.selectedScanId) state.coverage = m.data || {};
        if(m.type === 'target_profile' && m.scan_id === state.selectedScanId) state.targetProfile = m.data || {};
        if(m.type === 'adaptive_plan' && m.scan_id === state.selectedScanId) state.adaptivePlan = m.data || {};
        if(m.type === 'throttle_warning' && m.scan_id === state.selectedScanId){
          state.autopilot.smart_throttle = m.status_snapshot || state.autopilot.smart_throttle || {};
          state.autopilot.smart_throttle.last_block_reason = m.reason || state.autopilot.smart_throttle.last_block_reason;
        }
        render();
      };
    }
    function mergeScans(scans){
      const map = new Map(state.scans.map(s => [s.id, s]));
      scans.forEach(s => map.set(s.id, {...(map.get(s.id)||{}), ...s}));
      return Array.from(map.values()).sort((a,b) => String(b.started||'').localeCompare(String(a.started||'')));
    }
    function patchScan(id, patch){
      if(!id) return;
      const idx = state.scans.findIndex(s => s.id === id);
      if(idx >= 0) state.scans[idx] = {...state.scans[idx], ...patch};
    }

    function reportChecklist(body){
      const text = String(body || '');
      const hasValue = pattern => pattern.test(text) && !/TODO|\.\.\./i.test(text.match(pattern)?.[0] || '');
      return [
        ['Affected asset confirmed', hasValue(/https?:\/\/[^\s`|)]+/i)],
        ['Reproduction steps complete', hasValue(/(?:Reproduction|Steps to Reproduce)[\s\S]{0,1200}(?:\n\s*(?:1[.)]|-)\s+\S+)/i)],
        ['Evidence attached', hasValue(/Evidence[\s\S]{0,800}\S+/i)],
        ['Severity set', hasValue(/Severity\s*:?\s*(?:Critical|High|Medium|Low)/i)],
        ['Business impact complete', hasValue(/(?:Business Impact|Impact)\s*:?\s*(?!TODO|\.\.\.)\S+/i)]
      ];
    }
    function highlightedReport(body){
      let safe = esc(body);
      safe = safe.replace(/TODO|\.\.\./gi, match => `<mark style="background:#facc15;color:#111;padding:1px 3px">${match}</mark>`);
      safe = safe.replace(
        /(^|\n)(#{1,6}\s+[^<\n]+|\*\*[^*\n]+:\*\*)\s*\n\s*(?=\n|$)/g,
        (_match, prefix, heading) => `${prefix}<mark style="background:#facc15;color:#111;padding:1px 3px">${heading} — empty</mark>\n`
      );
      return safe;
    }

    function wizardNext(){
      const w = state.wizard;
      w.error = '';
      if(w.step === 2){
        w.target = normalizeWizardTarget(w.target);
        if(!/^https?:\/\//i.test(w.target)){
          w.error = 'Please start the address with http:// or https://';
          renderStart();
          return;
        }
        try{
          const parsed = new URL(w.target);
          if(!['http:','https:'].includes(parsed.protocol) || !parsed.hostname) throw new Error('invalid');
        }catch(e){
          w.error = 'Enter a valid website, for example https://example.com';
          renderStart();
          return;
        }
      }
      if(w.step === 4 && w.scopeType === 'custom' && !w.customScope.trim()){
        w.error = 'Add at least one authorized domain or URL to the custom scope.';
        renderStart();

    async function launchWizardScan(){
      const w = state.wizard;
      if(w.busy) return;
      w.busy = true;
      w.error = '';
      renderStart();
      try{
        const targetUrl = new URL(normalizeWizardTarget(w.target));
        let allowedDomains = [targetUrl.hostname];
        let allowedPatterns = w.scopeType === 'exact' ? [targetUrl.origin, `${targetUrl.origin}/*`] : [];
        if(w.scopeType === 'custom'){
          const entries = w.customScope.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
          allowedDomains = [];
          allowedPatterns = [];
          for(const entry of entries){
            try{
              const parsed = new URL(normalizeWizardTarget(entry));
              allowedDomains.push(parsed.hostname);
              if(/^https?:\/\//i.test(entry)) allowedPatterns.push(`${parsed.origin}${parsed.pathname === '/' ? '/*' : parsed.pathname + '*'}`);
            }catch(e){
              allowedDomains.push(entry.replace(/^\*\./, ''));
            }
          }
          allowedDomains = [...new Set(allowedDomains.filter(Boolean))];
        }
        const backendMode = w.scanMode === 'bounty' ? 'conservative' : w.scanMode;
        const passive = backendMode === 'passive_only';
        const deep = w.scanMode === 'intensive_authorized';
        const scopeBody = {
          ...state.scope,
          allowed_domains: allowedDomains,
          allowed_url_patterns: allowedPatterns,
          scan_mode: backendMode,
          passive_only_mode: passive,
          active_testing_enabled: !passive,
          authenticated_testing_enabled: deep || wizardHasSessions(),
          cloud_ai_enabled: w.aiMode === 'cloud_fallback',
          emergency_stop: false
        };
        const scopeResponse = await fetch(endpoint('/scope'), {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(scopeBody)});
        if(!scopeResponse.ok) throw new Error(await scopeResponse.text());
        state.scope = await scopeResponse.json();

        const privacyBody = {
          ...state.aiPrivacy,
          local_ollama_preferred: true,
          cloud_ai_enabled: w.aiMode === 'cloud_fallback'
        };
        const privacyResponse = await fetch(endpoint('/ai/privacy'), {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(privacyBody)});
        if(!privacyResponse.ok) throw new Error(await privacyResponse.text());
        state.aiPrivacy = await privacyResponse.json();

        if(wizardHasSessions()){
          const sessionResponse = await fetch(endpoint('/config/sessions'), {
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
              session_a_cookie:w.sessionACookie,session_a_token:w.sessionAToken,
              session_b_cookie:w.sessionBCookie,session_b_token:w.sessionBToken
            })
          });
          if(!sessionResponse.ok) throw new Error(await sessionResponse.text());
        }

        const validationResponse = await fetch(endpoint('/scope/validate-target'), {
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({target:w.target,action:'scan'})
        });
        const validation = await validationResponse.json();
        if(!validation.allowed) throw new Error(validation.reason || 'The target is outside the saved scope.');

        const profileResponse = await fetch(endpoint('/auto/profile-target'), {
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({target:w.target,scan_mode:backendMode,authorization_confirmed:true})
        });
        if(!profileResponse.ok) throw new Error(await profileResponse.text());
        const profileData = await profileResponse.json();
        state.targetProfile = profileData.target_profile || {};
        state.adaptivePlan = profileData.adaptive_plan || {};

        const scanResponse = await fetch(endpoint('/autopilot/start'), {
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({target:w.target,scan_mode:backendMode,authorization_confirmed:true})
        });
        if(!scanResponse.ok) throw new Error(await scanResponse.text());
        const scan = await scanResponse.json();
        state.scans.unshift({id:scan.scan_id,target:scan.target,status:'queued',phase:'queued',started:new Date().toISOString()});
        selectScan(scan.scan_id, false);
        await refreshSelectedArtifacts();
        w.busy = false;
        go('/ui/active-scan');
      }catch(e){
        w.busy = false;
        w.error = String(e && e.message ? e.message : e);
        renderStart();
      }
    }

    function estimatedTimeRemaining(scan, endpointCount){
      const pct = progressOf(scan);
      if(pct >= 100) return 'Complete';
      const phase = String(scan?.phase || 'queued').toLowerCase();
      const endpoints = Math.max(1, Number(endpointCount || 20));
      let minutes = Math.ceil(endpoints / 12);
      if(phase.includes('recon')) minutes += 3;
      else if(phase.includes('hunt')) minutes = Math.max(2, Math.ceil(endpoints / 8));
      else if(phase.includes('triage')) minutes = Math.max(1, Math.ceil((100 - pct) / 8));
      else if(phase.includes('analysis')) minutes = 2;
      else if(phase.includes('report')) minutes = 1;
      else minutes += 4;
      return `about ${minutes} minute${minutes === 1 ? '' : 's'}`;
    }
    function beginnerProgressCards(scan){
      const phase = String(scan?.phase || 'queued').toLowerCase();
      const complete = ['complete','completed'].includes(String(scan?.status || '').toLowerCase());
      const profile = state.targetProfile || {};
      const plan = state.adaptivePlan || {};
      const phases = [
        {label:'Checking target behavior', keys:['queued','profiling','waf_check']},
        {label:'Discovering endpoints (high confidence)', keys:['recon']},
        {label:profile.api_heavy ? 'Expanding attack surface (API detected)' : 'Finding interesting endpoints', keys:['schema','content']},
        {label:(plan.level === 'DEEP' && profile.authentication_detected) ? 'Switching to deep analysis (auth system found)' : `Testing selected modules (${(plan.enabled_modules || []).length || 'adaptive'})`, keys:['hunt','oob']},
        {label:'Running AI triage', keys:['triage','analysis']},
        {label:'Building report', keys:['report','intelligence','complete']}
      ];
      let active = phases.findIndex(item => item.keys.some(key => phase.includes(key)));
      if(active < 0) active = phase === 'queued' ? 0 : 1;

          <div class="card pad" style="grid-column:1/-1"><div class="card-title">Advanced</div><div class="card-sub">These pages are still available, but hidden from the main sidebar.</div><div style="height:12px"></div><div class="toolbar"><button class="btn" onclick="go('/ui/scope')">Scope</button><button class="btn" onclick="go('/ui/ai')">AI</button><button class="btn" onclick="go('/ui/coverage')">Coverage</button><button class="btn" onclick="go('/ui/attack-graph')">Attack Graph</button><button class="btn" onclick="go('/ui/bounty')">Bounty Mode</button><button class="btn" onclick="go('/ui/review')">Review Queue</button><button class="btn" onclick="go('/ui/storage')">Storage</button><button class="btn" onclick="go('/ui/help')">Help</button></div></div>

    function renderAI(){
      document.getElementById('route-ai').innerHTML = `
        <div class="grid cols-4">${metric('Fast calls', state.ai.fast_calls ?? 0, state.ai.routing?.fast_model || 'mistral')}${metric('Reasoning calls', state.ai.reasoning_calls ?? 0, state.ai.routing?.reasoning_model || 'llama3.1:8b')}${metric('Cloud calls', state.ai.cloud_calls ?? 0, 'Privacy-gated')}${metric('Fallbacks', state.ai.reasoning_fallbacks ?? 0, state.ai.last_routing_reason || 'None')}</div>

        <div class="card pad"><div class="card-title">Last AI Route</div><div style="height:12px"></div><div class="kv"><div>Provider</div><div>${esc(state.ai.last_selected_provider || '-')}</div><div>Model</div><div>${esc(state.ai.last_selected_model || '-')}</div><div>Reason</div><div>${esc(state.ai.last_routing_reason || '-')}</div><div>Threads</div><div>${esc(state.ai.routing?.num_threads ?? 8)}</div><div>Reasoning context</div><div>${esc(state.ai.routing?.reasoning_num_ctx ?? 6144)}</div></div></div>
        <div style="height:14px"></div>
        <div class="card pad ${state.advancedMode ? '' : 'hidden'}"><div class="card-title">AI Audit</div><div style="height:12px"></div>
          <div class="table-wrap"><table><thead><tr><th>Time</th><th>Provider</th><th>Cloud</th><th>Allowed</th><th>Reason</th><th>Chars</th></tr></thead><tbody>
            ${state.aiAudit.slice().reverse().map(e => `<tr><td>${esc(e.timestamp)}</td><td>${esc(e.provider)} / ${esc(e.model)}</td><td>${esc(e.cloud)}</td><td>${esc(e.allowed)}</td><td>${esc(e.reason)}</td><td>${esc(e.prompt_chars)}</td></tr>`).join('') || '<tr><td colspan="6"><div class="empty">No AI audit events yet.</div></td></tr>'}
          </tbody></table></div>
        </div>`;
    }
    function renderScope(){
      const s = state.scope || {};
      document.getElementById('route-scope').innerHTML = `
        <div class="notice">ScopePolicy is enforced by the backend before scans, recon, passive analysis, active tests, OOB payloads, and cloud AI routing.</div>
        <div style="height:14px"></div>
        <div class="grid cols-4">
          ${metric('Mode', s.scan_mode || 'conservative', 'Allowed scan mode')}
          ${metric('RPM', s.max_requests_per_minute ?? 120, 'Request limit')}
          ${metric('Total cap', s.max_total_requests ?? 5000, 'All requests')}
          ${metric('Emergency', s.emergency_stop ? 'ON' : 'OFF', 'Stops scans')}
        </div>
        <div style="height:14px"></div>
        <div class="grid cols-2">
          <div class="card pad"><div class="card-title">Allowed Domains</div><textarea class="textarea" id="scope-allowed-domains">${esc((s.allowed_domains||[]).join('\n'))}</textarea></div>
          <div class="card pad"><div class="card-title">Blocked Domains</div><textarea class="textarea" id="scope-blocked-domains">${esc((s.blocked_domains||[]).join('\n'))}</textarea></div>
          <div class="card pad"><div class="card-title">Allowed URL Patterns</div><textarea class="textarea" id="scope-allowed-patterns">${esc((s.allowed_url_patterns||[]).join('\n'))}</textarea></div>
          <div class="card pad"><div class="card-title">Blocked URL Patterns</div><textarea class="textarea" id="scope-blocked-patterns">${esc((s.blocked_url_patterns||[]).join('\n'))}</textarea></div>
          <div class="card pad"><div class="card-title">Allowed Vulnerability Classes</div><textarea class="textarea" id="scope-allowed-classes">${esc((s.allowed_vulnerability_classes||[]).join('\n'))}</textarea></div>
          <div class="card pad"><div class="card-title">Forbidden Vulnerability Classes</div><textarea class="textarea" id="scope-forbidden-classes">${esc((s.forbidden_vulnerability_classes||[]).join('\n'))}</textarea></div>
        </div>
        <div style="height:14px"></div>
        <div class="card pad">
          <div class="card-title">Controls</div><div style="height:12px"></div>
          <div class="grid cols-3">
            <select class="select" id="scope-mode">${(s.scan_modes||['passive_only','conservative','normal','intensive_authorized']).map(m => `<option ${s.scan_mode===m?'selected':''}>${m}</option>`).join('')}</select>
            <input class="input" id="scope-max-depth" type="number" value="${esc(s.max_depth ?? 2)}" placeholder="Max depth">
            <input class="input" id="scope-rpm" type="number" value="${esc(s.max_requests_per_minute ?? 120)}" placeholder="Max requests per minute">
            <input class="input" id="scope-total" type="number" value="${esc(s.max_total_requests ?? 5000)}" placeholder="Max total requests">
            <label><input type="checkbox" id="scope-passive" ${s.passive_only_mode?'checked':''}> Passive-only mode</label>
            <label><input type="checkbox" id="scope-active" ${s.active_testing_enabled!==false?'checked':''}> Active testing enabled</label>
            <label><input type="checkbox" id="scope-auth" ${s.authenticated_testing_enabled?'checked':''}> Authenticated testing enabled</label>
            <label><input type="checkbox" id="scope-oob" ${s.oob_testing_enabled?'checked':''}> OOB testing enabled</label>
            <label><input type="checkbox" id="scope-cloud" ${s.cloud_ai_enabled?'checked':''}> Cloud AI enabled</label>
            <label><input type="checkbox" id="scope-emergency" ${s.emergency_stop?'checked':''}> Emergency stop</label>
          </div>
          <div style="height:12px"></div><button class="btn primary" onclick="saveScope()">Save ScopePolicy</button>

        <div class="card pad"><div class="card-title">Validate Target</div><div style="height:12px"></div><input class="input" id="scope-validate-target" placeholder="https://target.example"><button class="btn blue" style="margin-left:8px" onclick="validateScopeTarget()">Validate</button><div id="scope-validation-result" class="card-sub" style="margin-top:10px"></div></div>`;

    function renderStorage(){
      const s = state.storage || {};
      document.getElementById('route-storage').innerHTML = `
        <div class="card pad">
          <div class="card-title">Storage</div>
          <div class="card-sub">Current event-store status loaded from the local backend.</div>
          <div style="height:12px"></div>
          <div class="grid cols-4">${metric('Backend', s.database_url || 'unknown', 'Storage engine')}${metric('Events', s.events ?? 0, 'Stored events')}${metric('Audit events', s.audit_events ?? 0, 'Audit trail')}${metric('Retention', s.retention_policy || '-', 'Current policy')}</div>
          ${state.advancedMode ? `<div style="height:14px"></div><pre class="pre">${esc(JSON.stringify(s, null, 2))}</pre>` : ''}
        </div>`;
    }
    function renderPlaceholder(key){
      const name = String(key || 'Page').replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
      document.getElementById('route-placeholder').innerHTML = `
        <div class="card pad">
          <div class="card-title">${esc(name)}</div>
          <div class="card-sub">Coming soon.</div>
        </div>`;
    }
    function renderSystemCheck(){
      const s = state.systemCheck || {};
      const dry = state.dryRunResult;
      const checks = normalizeSystemChecks(s.checks);
      const summary = checks.reduce((acc, c) => {
        acc[c.uiStatus] = (acc[c.uiStatus] || 0) + 1;
        return acc;
      }, {green:0, yellow:0, red:0});
      document.getElementById('route-system-check').innerHTML = `
        <div class="toolbar">
          <button class="btn primary" onclick="runSystemCheck()">Run System Check</button>
          <button class="btn blue" onclick="testAutopilotDryRun()">Test Autopilot Dry Run</button>
          <button class="btn" onclick="go('/ui/autopilot')">Open Autopilot</button>
          <button class="btn" onclick="go('/ui/bounty')">Open Bounty Mode</button>
        </div>
        <div class="grid cols-4">
          ${metric('Overall', s.overall || 'not run', 'healthy / degraded / error')}
          ${metric('Green', summary.green, 'Healthy checks')}
          ${metric('Yellow', summary.yellow, 'Available with warning')}
          ${metric('Red', summary.red, 'Needs attention')}
        </div>
        <div style="height:14px"></div>
        <div class="grid cols-2">
          <div class="card pad"><div class="card-title">Local URLs</div><div style="height:12px"></div><div class="kv"><div>Server</div><div class="mono">${esc(s.api_url || s.server_url || 'http://127.0.0.1:8888')}</div><div>Dashboard</div><div class="mono">${esc(s.dashboard_url || 'http://127.0.0.1:8888/ui')}</div></div></div>
          <div class="card pad"><div class="card-title">Dry Run</div><div style="height:12px"></div><div class="notice">The dry run creates mock local scan data in memory and durable Autopilot state. It does not scan the internet.</div></div>
        </div>
        ${dry ? `<div style="height:14px"></div><div class="card pad"><div class="card-head"><div><div class="card-title">Autopilot Dry Run Result</div><div class="card-sub">${esc(dry.target)}</div></div><span class="tag">DRY RUN</span></div><div class="kv"><div>Scan mode</div><div>${esc(dry.scan_mode)}</div></div><div style="height:14px"></div><div class="grid cols-4"><div class="card pad" style="border-color:var(--green)"><div class="metric" style="color:var(--green)">${esc(dry.valid_bugs_count ?? 0)}</div><div class="metric-label">Valid bugs</div></div><div class="card pad" style="border-color:var(--amber)"><div class="metric" style="color:var(--amber)">${esc(dry.needs_more_proof_count ?? 0)}</div><div class="metric-label">Needs more proof</div></div><div class="card pad"><div class="metric">${esc(dry.candidates_count ?? 0)}</div><div class="metric-label">Candidates</div></div><div class="card pad" style="border-color:var(--blue)"><div class="metric" style="color:var(--blue)">${esc(dry.informational_count ?? 0)}</div><div class="metric-label">Informational</div></div></div></div>` : ''}
        <div style="height:14px"></div>
        <div class="grid cols-3">${checks.map(systemCheckCard).join('') || '<div class="empty" style="grid-column:1/-1">Click Run System Check to verify the local platform.</div>'}</div>`;
    }
    function normalizeSystemChecks(checks){
      if (Array.isArray(checks)) {
        return checks.map(c => ({...c, uiStatus: c.status === 'green' || c.status === 'ok' || c.status === 'available' ? 'green' : (c.status === 'yellow' || c.status === 'missing' || c.status === 'unavailable' ? 'yellow' : 'red')}));
      }
      return Object.entries(checks || {}).map(([key, value]) => {
        const status = value.status || 'error';
        const uiStatus = status === 'ok' || status === 'available' ? 'green' : (status === 'missing' || status === 'unavailable' ? 'yellow' : 'red');
        return {name: key.replace(/_/g, ' '), status, uiStatus, detail: value.detail || '', data: value.data || {}};
      });
    }
    function systemCheckCard(c){
      const uiStatus = c.uiStatus || c.status;
      const color = uiStatus === 'green' ? 'var(--green)' : (uiStatus === 'yellow' ? 'var(--amber)' : 'var(--red)');
      return `<div class="card pad" style="border-color:${color}">
        <div class="card-head"><div><div class="card-title">${esc(c.name)}</div><div class="card-sub">${esc(c.detail)}</div></div><span class="pill"><span class="dot ${uiStatus === 'green' ? 'ok' : (uiStatus === 'yellow' ? 'warn' : 'bad')}"></span>${esc(c.status)}</span></div>
        ${state.advancedMode && c.data && Object.keys(c.data).length ? `<pre class="pre" style="max-height:170px">${esc(JSON.stringify(c.data, null, 2))}</pre>` : ''}
      </div>`;
    }
    function renderHelp(){
      document.getElementById('route-help').innerHTML = `
        <div class="grid cols-2">
          <div class="card pad"><div class="card-title">Local URLs</div><div style="height:12px"></div><div class="kv"><div>Backend</div><div class="mono">http://127.0.0.1:8888</div><div>Dashboard</div><div class="mono">http://127.0.0.1:8888/ui</div><div>Local domain</div><div class="mono">http://burpollama.localhost:8888/ui</div></div></div>
          <div class="card pad"><div class="card-title">Workflow</div><div style="height:12px"></div><div class="list"><div class="row-card">Configure AI and sessions</div><div class="row-card">Start an authorized scan</div><div class="row-card">Review findings and ambiguous queue</div><div class="row-card">Open coverage, attack graph, and reports</div></div></div>
          <div class="card pad" style="grid-column:1/-1"><div class="card-title">API Reference</div><div style="height:12px"></div><pre class="pre">POST /scan
POST /auto/profile-target
POST /autopilot/start
POST /autopilot/resume
GET /autopilot/dry-run
GET /autopilot/state
GET /system-check
POST /system-check/run
GET /scans
GET /scan/{scan_id}
GET /scan/{scan_id}/coverage
GET /scan/{scan_id}/attack-graph
GET /scan/{scan_id}/autopilot
GET /scan/{scan_id}/autopilot/report
GET /scan/{scan_id}/bounty
GET /scan/{scan_id}/bounty/markdown
GET /scan/{scan_id}/bounty/json
POST /scan/{scan_id}/retry-failed-task
GET /scan/{scan_id}/report
GET /findings
GET /review
GET /ai/providers
GET /ai/privacy
POST /ai/privacy
GET /ai/audit
GET /scope
POST /scope
POST /scope/validate-target
GET /metrics
POST /analyze</pre></div>
        </div>`;
    }

    function go(path){
      history.pushState({}, '', path);
      routeFromPath();
      render();
    }
    function routeFromPath(){
      const parts = location.pathname.replace(/^\/ui\/?/, '').split('/').filter(Boolean);
      let first = parts[0] || 'start';
      if(first === 'home') first = 'dashboard';
      if(first === 'scans' && parts[1]){
        state.route = 'scan-detail';
        selectScan(parts[1], false);
      }else{
        state.route = first;
      }
    }
    document.getElementById('nav').addEventListener('click', ev => {
      const a = ev.target.closest('a');
      if(!a) return;
      ev.preventDefault();
      go(a.getAttribute('href'));
    });
    window.addEventListener('popstate', () => { routeFromPath(); render(); });

    routeFromPath();
    connectWs();
    refreshAll();
    setInterval(refreshLiveScan, 3000);
    setInterval(refreshAll, 15000);
  </script>
</body>
